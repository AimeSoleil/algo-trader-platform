syntax = "proto3";

package algo_trader.signal;

option go_package = "algo_trader/signal";

message SignalRequest {
  string symbol = 1;
  string date = 2;           // YYYY-MM-DD
}

// ── Option-derived indicators ───────────────────────────────────────
message OptionIndicatorsMsg {
  // Core IV metrics
  double iv_rank = 1;
  double iv_percentile = 2;
  double current_iv = 3;
  double historical_iv_30d = 4;

  // Put/call & skew
  double pcr_volume = 5;
  double pcr_oi = 6;
  double iv_skew = 7;
  double term_structure_slope = 8;

  // Surface & greeks
  double vol_surface_fit_error = 9;
  double gamma_peak_strike = 10;
  double theta_decay_rate = 11;
  double vanna = 12;
  double charm = 13;

  // Flow & microstructure
  double oi_concentration_top5 = 14;
  double bid_ask_spread_ratio = 15;
  double option_volume_imbalance = 16;

  // Spread analytics
  double vertical_spread_risk_reward = 17;
  double calendar_spread_theta_capture = 18;
  double butterfly_pricing_error = 19;
  double box_spread_arbitrage = 20;

  // Maps & lists
  map<string, double> atm_iv = 21;
  map<string, double> delta_exposure_profile = 22;
  map<string, double> portfolio_greeks = 23;
  map<string, double> confidence_scores = 24;
  repeated string extreme_flags = 25;
}

// ── Stock / technical indicators ────────────────────────────────────
message StockIndicatorsMsg {
  // Momentum
  double rsi_14 = 1;
  double macd = 2;
  double macd_signal = 3;
  double macd_histogram = 4;

  // Moving averages
  double ema_20 = 5;
  double ema_50 = 6;
  double sma_200 = 7;

  // Bands & channels
  double bollinger_upper = 8;
  double bollinger_lower = 9;
  double bollinger_mid = 10;
  double atr_14 = 11;
  double adx_14 = 12;
  double keltner_mid = 13;
  double keltner_upper = 14;
  double keltner_lower = 15;

  // Ichimoku & regression
  double ichimoku_tenkan = 16;
  double ichimoku_kijun = 17;
  double ichimoku_span_a = 18;
  double ichimoku_span_b = 19;
  double linear_reg_slope = 20;

  // Volatility
  double bollinger_band_width = 21;
  double hv_20d = 22;
  double hv_iv_spread = 23;
  double garch_vol_forecast = 24;

  // Volume / flow
  double vwap = 25;
  double volume_profile_poc = 26;
  double volume_profile_val = 27;
  double volume_profile_vah = 28;
  double cmf_20 = 29;
  double tick_volume_delta = 30;

  // Divergence / oscillators
  double rsi_divergence = 31;
  double stoch_rsi = 32;
  double macd_hist_divergence = 33;

  // Trend
  string trend = 34;
  double trend_strength = 35;

  // Maps & lists
  map<string, double> confidence_scores = 36;
  repeated string extreme_flags = 37;
}

// ── Cross-asset / macro indicators ──────────────────────────────────
message CrossAssetIndicatorsMsg {
  double stock_iv_correlation = 1;
  double option_vs_stock_volume_ratio = 2;
  double delta_adjusted_hedge_ratio = 3;
  double spy_beta = 4;
  double sector_relative_strength = 5;
  int32  earnings_proximity_days = 6;
  double index_correlation_20d = 7;

  map<string, double> confidence_scores = 8;
}

// ── Top-level signal feature vector ─────────────────────────────────
message SignalFeaturesResponse {
  string symbol = 1;
  string date = 2;
  double close_price = 3;
  double daily_return = 4;
  int64  volume = 5;
  string bar_type = 6;

  OptionIndicatorsMsg       option_indicators = 7;
  StockIndicatorsMsg        stock_indicators = 8;
  CrossAssetIndicatorsMsg   cross_asset_indicators = 9;

  string volatility_regime = 10;
}

// ── Batch wrappers ──────────────────────────────────────────────────
message BatchSignalRequest {
  repeated string symbols = 1;
  string date = 2;
}

message BatchSignalResponse {
  repeated SignalFeaturesResponse features = 1;
}

// ── Service ─────────────────────────────────────────────────────────
service SignalService {
  rpc GetSignalFeatures(SignalRequest) returns (SignalFeaturesResponse);
  rpc GetBatchSignalFeatures(BatchSignalRequest) returns (BatchSignalResponse);
}
