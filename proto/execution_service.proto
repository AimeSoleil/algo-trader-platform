syntax = "proto3";

package algo_trader.execution;

option go_package = "algo_trader/execution";

message BlueprintStatusRequest {
  string trading_date = 1;
}

message BlueprintStatusResponse {
  string id = 1;
  string trading_date = 2;
  string status = 3;
  int32 total_plans = 4;
  int32 entered_plans = 5;
  int32 exited_plans = 6;
  string loaded_at = 7;
}

message OrderStatusRequest {
  string order_id = 1;
}

message OrderStatusResponse {
  string order_id = 1;
  string status = 2;
  string underlying = 3;
  int32 total_legs = 4;
  int32 filled_legs = 5;
  string created_at = 6;
  string updated_at = 7;
}

message ManualOverrideRequest {
  string action = 1;          // "cancel_blueprint" / "close_all" / "pause" / "resume"
  string reason = 2;
}

message ManualOverrideResponse {
  bool success = 1;
  string message = 2;
}

service ExecutionService {
  rpc GetBlueprintStatus(BlueprintStatusRequest) returns (BlueprintStatusResponse);
  rpc GetOrderStatus(OrderStatusRequest) returns (OrderStatusResponse);
  // 人工干预通道
  rpc ManualOverride(ManualOverrideRequest) returns (ManualOverrideResponse);
}
