# ── Redis Master-Only Configuration ──────────────────────
# Prevent this instance from ever becoming a replica.

# Explicitly disable replication
replicaof no one

# Reject REPLICAOF / SLAVEOF commands at runtime so no external
# command can accidentally turn this node into a read-only replica.
rename-command REPLICAOF ""
rename-command SLAVEOF ""

# ── Persistence ──────────────────────────────────────────
appendonly yes
save 900 1
save 300 10
save 60 10000

# ── Memory ───────────────────────────────────────────────
maxmemory-policy allkeys-lru
