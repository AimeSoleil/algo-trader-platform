# ── Redis Cluster Node Configuration ─────────────────────
# Each node loads this config; port is overridden via CLI --port.

# Enable cluster mode
cluster-enabled yes
cluster-config-file nodes.conf
cluster-node-timeout 5000
dir /data

# ── Persistence ──────────────────────────────────────────
appendonly yes
save 900 1
save 300 10
save 60 10000

# ── Memory ───────────────────────────────────────────────
maxmemory-policy allkeys-lru

# ── Network ──────────────────────────────────────────────
# Allow connections from Docker network
protected-mode no
