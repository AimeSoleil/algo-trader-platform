# ── Redis Standalone Configuration ───────────────────────
dir /data

# ── Replication ──────────────────────────────────────────
# Force standalone mode; do NOT act as a replica
# Clears any persisted replication state
slaveof NO ONE
replicaof NO ONE

# ── Persistence ──────────────────────────────────────────
appendonly yes
save 900 1
save 300 10
save 60 10000

# ── Memory ───────────────────────────────────────────────
maxmemory-policy allkeys-lru

# ── Network ──────────────────────────────────────────────
# Allow connections from Docker network
protected-mode no

# ── Authentication ───────────────────────────────────────
# Password is injected via environment variable at runtime
# from docker-compose or .env configuration
