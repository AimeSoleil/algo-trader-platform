# ── Redis Standalone Configuration ───────────────────────
dir /data

# ── Persistence ──────────────────────────────────────────
appendonly yes
save 900 1
save 300 10
save 60 10000

# ── Memory ───────────────────────────────────────────────
maxmemory-policy allkeys-lru

# ── Network ──────────────────────────────────────────────
# Allow connections from Docker network
protected-mode no
