# ═══════════════════════════════════════════════════════════
# 期权聚焦型量化交易平台 — 核心配置
# ═══════════════════════════════════════════════════════════


# ── Infrastructure — 基础设施连接 ────────────────────────────

database:
  timescale_url: "postgresql+asyncpg://trader:trader_dev@localhost:5432/algo_trader"
  postgres_url: "postgresql+asyncpg://trader:trader_dev@localhost:5433/algo_trader_biz"

redis:
  url: "redis://localhost:6379/0"             # standalone fallback
  cluster_enabled: true
  cluster_nodes:
    - host: "127.0.0.1"
      port: 6380
    - host: "127.0.0.1"
      port: 6381
    - host: "127.0.0.1"
      port: 6382

rabbitmq:
  url: "amqp://trader:trader_dev@localhost:5672//"

minio:
  endpoint: "localhost:9000"
  access_key: "minioadmin"
  secret_key: "minioadmin"
  secure: false


# ── Broker — 交易通道 ───────────────────────────────────────

broker:
  type: "paper"                      # paper | futu
  paper:
    initial_cash: 100000.0
  futu:
    host: "127.0.0.1"
    port: 11111
    trader_id: ""
    trd_env: "SIMULATE"              # SIMULATE | REAL
    market: "US"


# ── Services — 各服务业务配置 ────────────────────────────────

data_service:
  # ── 数据源选择 ──
  providers:
    stock: "yfinance"                  # stock bar provider: yfinance | ...
    options: "yfinance"                # option chain provider: yfinance | ...

  # ── 交易时段 ──
  market_hours:
    start: "09:30"
    end: "16:00"

  # ── 盘中采集 ──
  intraday:
    capture_every_minutes: 5
    retention_days:
      stock_1min: 90                   # 盘中 1m bars 热存储保留天数
      option_5min: 60                  # 盘中 option snapshots 保留天数

  # ── 期权采集专属 ──
  options:
    max_days_to_expiry: 730            # 跳过超过此天数的远期到期日（~2年）

  # ── 采集器韧性（provider 无关）──
  resilience:
    max_retries: 3                     # 每次 API 调用最大重试次数
    backoff_base_seconds: 1.0          # 指数退避基础（1s → 2s → 4s）
    rate_limit_per_call_seconds: 0.5   # 单次 API 调用间隔（如每个到期日请求之间）
    rate_limit_per_symbol_seconds: 1.5 # 多 symbol 批量采集时，symbol 之间的间隔
    concurrent_symbols: 3              # 多 symbol 批量采集最大并发数

option_strategy:
  lookback_days: 252                 # iv_percentile 滚动窗口（交易日）
  high_quantile: 0.7                 # iv_percentile >= 70 → 高波动区间
  low_quantile: 0.3                  # iv_percentile <= 30 → 低波动区间

llm:
  provider: "copilot"                 # openai / copilot
  openai:
    api_key: ""                       # or env: LLM__OPENAI__API_KEY
    model: "claude-opus-4.6"
    temperature: 0.1
    max_tokens: 8192
    request_timeout_seconds: 600
  copilot:
    cli_path: "copilot"
    github_token: ""                  # or env: LLM__COPILOT__GITHUB_TOKEN
    model: "claude-opus-4.6"
    reasoning_effort: "medium"        # low / medium / high
    request_timeout_seconds: 600
  cache_enabled: true
  cache_ttl: 3600
  skill_dir: ""
  agentic_mode: true                    # true = multi-agent pipeline, false = legacy chunk-split
  max_critic_revisions: 2               # Synthesizer↔Critic revision rounds
  chunk_size: 5                        # max symbols per LLM chunk (excl. benchmarks)
  max_concurrent_chunks: 3             # max parallel LLM calls for large watchlists
  benchmark_symbols: ["SPY", "QQQ"]    # injected into every chunk for market context


# ── Trading — 交易执行与风控 ─────────────────────────────────

trading:
  timezone: "America/New_York"
  execution_interval: 300            # 执行检查间隔（秒）= 5分钟

risk:
  stop_loss:
    enabled: true
    check_interval_seconds: 60
    portfolio_loss_limit: 2000.0
    position_loss_limit: 500.0
    cooldown_seconds: 60

data_quality:
  # ── 评分权重（三项之和 = 1.0）──
  weight_stock: 0.5              # 股票数据覆盖率占比
  weight_option: 0.3             # 期权数据覆盖率占比
  weight_degradation: 0.2        # 无降级指标奖励
  # ── 满分参考行数 ──
  stock_full_bars: 260           # ≈ 1 年交易日
  option_full_rows: 200
  # ── 执行门控阈值 ──
  skip_threshold: 0.3            # score < 此值 → 完全跳过执行
  reduce_threshold: 0.7          # score < 此值 → 仓位缩减
  reduce_factor: 0.5             # 缩减比例（0.5 = 减半）

schedule:
  blueprint_load_time: "09:20"       # 每日 9:20 加载当天的策略蓝图（盘前准备）
  market_open: "09:30"               # 9:30 市场开盘，开始执行策略
  market_close: "16:00"              # 16:00 市场收盘，停止交易
  batch_flush_time: "18:30"          # 18:30 批量 flush 当日交易数据
  backfill_time: "19:00"             # 19:00 开始执行盘后数据 backfill
  signal_compute_time: "19:30"       # 19:30 计算交易信号
  blueprint_generate_time: "20:00"   # 20:00 生成明天的策略蓝图

# ── Cross-asset benchmarks for multi-factor signal model ──
cross_asset_benchmarks: ["SPY", "QQQ", "IWM", "TLT"]
environment_symbols: ["^VIX"]  # market regime indicators (not traded)

watchlist:
  - "AAPL"
  - "MSFT"
  - "NVDA"
  - "TSLA"
  - "SPY"
  - "QQQ"
  - "IWM"
  - "TLT"
  - "^VIX"
  - "AMZN"
  - "META"
  - "GOOGL"
  - "AMD"


# ── Observability — 可观测性 ─────────────────────────────────

logging:
  level: "INFO"
  format: "json"                     # json / console
  to_console: true
  to_file: true
  file_path: "logs/algo-trader.log"
  file_rotate_mode: "time"           # time / size / none
  file_max_bytes: 104857600
  file_rotate: true
  file_rotate_when: "midnight"
  file_rotate_interval: 1
  file_backup_count: 14
  file_rotate_utc: false
