# ── Common — 跨服务共用配置 ─────────────────────────────────

common:
  timezone: "America/New_York"

  market_hours:
    start: "09:30"
    end: "16:00"

  watchlist:
    for_data_signal:
      # ── Unified tradable universe for data capture + signal generation ──
      # Analysis and trade both target this list directly.
      # Keep for_trade_benchmark as a subset of this list.
      # ── Macro Benchmark ETFs (Ultra-Liquid Strategy Backbone) ──
      - "SPY"                          # S&P 500 ETF | Ultra-liquid global macro benchmark, ideal for all options strategies (covered calls, spreads, hedging)
      - "QQQ"                          # Nasdaq 100 ETF | Tech/growth benchmark, high volatility, perfect for directional/volatility spreads
      - "IWM"                          # Russell 2000 ETF | Small-cap benchmark, high volatility, ideal for aggressive growth/volatility strategies
      - "DIA"                          # Dow Jones ETF | Blue-chip / value benchmark, still tradable and reused as analysis benchmark context
      - "TLT"                          # iShares 20+ Year Treasury Bond ETF | Ultra-liquid interest rate benchmark, critical for macro hedging, rate-sensitive spreads, and equity duration risk hedging
      - "VXX"                          # iPath Series B S&P 500 VIX Short-Term Futures ETN | Global volatility benchmark, highest liquidity for volatility-focused options, ideal for tail hedging and portfolio drawdown protection
      # ── Mega-Cap Tech / Growth Core ──
      - "AAPL"                         # Apple Inc. | Ultra-liquid blue-chip tech, low volatility, gold standard for covered calls/LEAPS
      - "MSFT"                         # Microsoft Corp. | AI/cloud leader, top 3 single-stock options volume, consistent institutional order flow
      - "TSLA"                         # Tesla Inc. | EV/AI leader, extreme retail/institutional flow, wide strike range for low-cost directional plays
      - "AMZN"                         # Amazon.com Inc. | E-commerce/cloud leader, high liquidity, sensitive to consumer spending trends
      - "META"                         # Meta Platforms Inc. | Social/AI leader, high volatility, industry-leading weekly options liquidity
      - "GOOGL"                        # Alphabet Inc. (Google) | Search/AI/cloud leader, low-volatility growth, perfect for consistent income strategies
      - "AMD"                          # Advanced Micro Devices | AI/PC chip competitor to NVDA, high speculative volume, liquid weekly expirations
      - "TSM"                          # Taiwan Semiconductor | Sole manufacturer of NVDA's cutting-edge AI GPUs, backbone of global semiconductor supply chain, ~220k average daily options contracts, 2026 revenue growth >20%
      # ── AI Infra Full-Stack Core ──
      - "NVDA"                         # NVIDIA Corp. | Global leader in AI GPUs/accelerators, backbone of modern AI datacenters, highest single-stock options volume in tech
      - "AVGO"                         # Broadcom Inc. | Leader in AI datacenter networking chips/ASICs, high-speed interconnect for AI clusters, low-volatility growth, consistent institutional flow
      - "SMCI"                         # Super Micro Computer | Leader in AI rack-scale servers & liquid cooling for datacenters, top 50 single-stock options volume, extreme institutional/retail flow
      - "MU"                           # Micron Technology | US-listed global DRAM/HBM leader, core AI datacenter high-bandwidth memory supplier, top 40 single-stock options volume
      - "ANET"                         # Arista Networks | Global leader in AI datacenter switching & cloud networking, top 30 single-stock options volume, consistent institutional AI infrastructure flow
      - "AMAT"                         # Applied Materials | Global leader in semiconductor manufacturing equipment for AI chips, critical to global AI supply chain, ~160k average daily options contracts, 18%+ 2026 revenue growth
      - "ORCL"                         # Oracle Corp. | Global enterprise software & cloud leader, rapidly growing AI cloud business, high institutional flow, ideal for stable income strategies
      - "WOLF"                         # Wolfspeed Inc. | Leader in silicon carbide (SiC) power semiconductors for AI datacenters and EVs, critical for energy-efficient AI compute, high-growth speculative play with rising institutional options flow
      - "PLTR"                         # Palantir Technologies | AI/defense software leader, high retail/institutional flow, volatile thematic play
      - "CRM"                          # Salesforce Inc. | Global #1 enterprise AI SaaS leader (Einstein GPT), top 20 single-stock options volume, ~220k daily contracts, 15%+ 2026 revenue growth (ADBE replacement)
      # ── Financial Infrastructure & Banking Foundation (FI Fiserv Archetype) ──
      - "FISV"                         # Fiserv Inc. | Global core banking & payment processing infrastructure leader, #1 US core banking systems provider, high liquidity, ideal for low-volatility covered calls
      - "V"                            # Visa Inc. | Global payments leader, ultra-liquid, low-volatility growth, ideal for consistent covered calls and consumer spending hedging
      - "JPM"                          # JPMorgan Chase & Co. | Largest US bank, global financial system backbone, top 15 single-stock options volume, perfect for macro rate hedging and financial sector spreads
      # ── Healthcare Backbone Foundation (UNH Archetype) ──
      - "UNH"                          # UnitedHealth Group Inc. | Largest US managed care & healthcare services provider, global healthcare infrastructure backbone, top 10 single-stock options volume, ultra-liquid defensive growth
      - "LLY"                          # Eli Lilly and Company | Biopharma leader, dominant diabetes/obesity franchise, high-volatility growth play, top 50 single-stock options volume
      # ── Industrial, Logistics & Critical Infrastructure ──
      - "UPS"                          # United Parcel Service Inc. | Global logistics & supply chain infrastructure leader, high institutional flow, steady cash flow, perfect for income strategies and supply chain cycle plays
      - "FDX"                          # FedEx Corp. | Global logistics & supply chain infrastructure leader, backbone of global shipping & e-commerce fulfillment, ultra-liquid, sensitive to economic cycles
      # ── Utilities, Telecom & Consumer Staples Foundation ──
      - "WMT"                          # Walmart Inc. | Top consumer staple defensive play, top 10 single-stock options volume, low correlation to growth swings
      - "T"                            # AT&T Inc. | Global telecom & broadband infrastructure leader, core US wireless, fiber, and 5G backbone, top 30 single-stock options liquidity
      # ── Optical Communications (AI Interconnect Backbone) ──
      - "LITE"                         # Lumentum Holdings | Global optical chip & module leader, 50%+ global share of high-end EML lasers for 800G/1.6T AI datacenter optics, high options liquidity
      - "MRVL"                         # Marvell Technology | Leader in AI Ethernet controllers & optical interconnect chips, critical for 800G/1.6T AI datacenter networks, liquid weekly options
      - "CIEN"                         # Ciena Corp | #1 global coherent optical networking leader for AI hyperscaler interconnect, 2026 growth forecast >15%, ~85k average daily options contracts
      - "AAOI"                         # Applied Optoelectronics | High-growth 800G/1.6T AI optical transceiver leader, hyperscaler-qualified, rising institutional options flow (added back per request)
      # ── Nuclear Power & SMR (AI Datacenter Power Backbone) ──
      - "OKLO"                         # Oklo Inc | 4th-gen SMR small modular reactor leader, exclusive power supply partnerships with NVIDIA/Meta for AI datacenters, options volume surged 6x in 2026
      - "BWXT"                         # BWX Technologies | Global nuclear reactor & SMR component leader, NASA/DoD prime contractor, core US nuclear infrastructure, high institutional options flow
      - "CCJ"                          # Cameco Corp | Global #2 uranium producer, nuclear fuel backbone for global reactor fleet, ultra-liquid options, high sensitivity to nuclear energy renaissance
      # ── Electronic Power & Power Semiconductors (AI Datacenter Power Lifeline) ──
      - "GEV"                          # GE Vernova | AI datacenter grid/power generation equipment leader, gas turbine/HVDC system global top 3, 2026 AI-driven breakout growth, high-liquidity options
      - "ON"                           # ON Semiconductor | Global leader in power semiconductors for AI datacenters, EVs, and industrial automation, core hyperscaler power infrastructure supplier, rising institutional options flow
      - "MPWR"                         # Monolithic Power Systems | Leader in high-efficiency power semiconductors for AI servers, 2026 revenue growth forecast >25%, ~90k average daily options contracts
      # ── Commercial Space & Aerospace ──
      - "RKLB"                         # Rocket Lab USA | Global commercial rocket launch leader, only SpaceX peer with consistent orbital launch cadence, NASA/defense core supplier, top 3 US aerospace options liquidity
      - "ASTS"                         # AST SpaceMobile | Space-based mobile broadband leader, global cellular coverage from low Earth orbit, high volatility, rising institutional options flow
      - "PL"                           # Planet Labs PBC | High-frequency Earth observation satellite leader, critical geospatial data infrastructure for AI applications, rapidly growing institutional options flow
      # ── Quantum Computing ──
      - "IONQ"                         # IonQ Inc | Trapped-ion quantum computing pure-play leader, enterprise partnerships with AWS/Microsoft, highest options volume among pure-play quantum stocks, 87% 2026 revenue growth forecast
      - "RGTI"                         # Rigetti Computing | Pure-play superconducting quantum computing leader, enterprise/government partnerships, high-growth quantum hardware developer, liquid retail/institutional options flow
      # ── AI Compute Operators (GPU Cloud / 算力房东) ──
      - "CRWV"                         # CoreWeave | North American AI compute rental absolute leader, NVIDIA-backed, $60B+ hyperscaler long-term contracts, top 50 US single-stock options liquidity
      - "DOCN"                         # DigitalOcean | High-growth cloud infrastructure provider with rapidly expanding AI GPU rental business, 2026 revenue growth forecast >20%, direct exposure to SME AI compute demand
      # ── Cybersecurity ──
      - "PANW"                         # Palo Alto Networks | Global AI-native cybersecurity leader, ~250k average daily options contracts, top 30 single-stock options volume, 15%+ 2026 revenue growth forecast
      - "CRWD"                         # CrowdStrike Holdings | Cloud-native endpoint security leader, AI-driven threat detection, ~200k average daily options contracts, high growth, liquid weekly expirations
      - "ZS"                           # Zscaler Inc | Zero Trust network security leader, cloud-native, ~100k average daily options contracts, high growth, AI security tailwinds
      # ── Crypto & Digital Assets Infrastructure ──
      - "COIN"                         # Coinbase Global | US regulated crypto exchange leader, high volatility, direct leveraged BTC/ETH price exposure, top 30 single-stock options volume
      - "IBIT"                         # Bit Digital Inc | Pure-play Bitcoin mining leader, high volatility, direct leveraged BTC price exposure, rising institutional options flow
    for_trade_benchmark:
      # Analysis benchmark context. Must remain a subset of for_data_signal.
      # These symbols remain tradable because analysis/trade target the
      # unified for_data_signal universe.
      - "SPY"                          # Broad Market Benchmark
      - "QQQ"                          # Tech / Growth Benchmark
      - "IWM"                          # Small Cap / Breadth Benchmark
      - "DIA"                          # Blue Chip / Value Benchmark (Dow Jones Industrial Average)
    for_signal_benchmark:
      - "SPY"                          # Broad Market Risk-On/Risk-Off Signal
      - "QQQ"                          # Tech / Growth Sentiment Signal
      - "IWM"                          # Small Cap / Domestic Economic Health Signal
      - "TLT"                          # 20Y+ Treasury / Interest Rate Expectations Signal
      - "^VIX"                         # Equity Volatility (Market Fear Gauge)
      - "GLD"                          # Safe Haven / Inflation Hedge Sentiment Signal
      - "HYG"                          # Credit Stress / High-Yield Bond Market Health Signal
      - "XLE"                          # Energy / Commodity Inflation Signal
      - "IBIT"                         # BTC / Crypto Sentiment Signal

  data_quality:                    # Signal Service and Trade Service 共用数据质量评分参数
    # ── 评分权重（三项之和 = 1.0）──
    weight_stock: 0.5              # 股票数据覆盖率占比
    weight_option: 0.3             # 期权数据覆盖率占比
    weight_degradation: 0.2        # 无降级指标奖励
    # ── 满分参考行数 ──
    stock_full_bars: 260           # ≈ 1 年交易日
    option_full_rows: 200
    # ── 执行门控阈值 ──
    skip_threshold: 0.3            # score < 此值 → 完全跳过执行
    reduce_threshold: 0.7          # score < 此值 → 仓位缩减
    reduce_factor: 0.5             # 缩减比例（0.5 = 减半）

  logging:
    level: "DEBUG"                        # 项目代码日志级别 (shared/, services/)
    lib_level: "INFO"                 # 第三方库日志级别 (celery, redis, yfinance, httpx, etc.)
    format: "json"                       # json / console
    to_console: true
    to_file: true
    file_path: "logs/algo-trader.log"
    file_rotate_mode: "time"           # time / size / none
    file_max_bytes: 104857600
    file_rotate: true
    file_rotate_when: "midnight"
    file_rotate_interval: 1
    file_backup_count: 14
    file_rotate_utc: false

  # ── Notifier — 异步通知（不阻塞主流程）──
  notifier:
    enabled: true
    daily_report_time: "16:30"           # ET — 每日交易报告推送时间
    backends:
      - type: "discord"
        enabled: true
        webhook_url: ""                  # or env: COMMON__NOTIFIER__BACKENDS__0__WEBHOOK_URL
        timeout: 10.0

  # ── Celery 通用运行时 (所有 worker 共享) ──
  celery:
    prefetch_multiplier: 4             # 每次从 broker 预取的任务数（analysis worker 单独覆盖为 1）
    max_memory_per_child: 300000       # KB — 子进程超出后自动重启（300 MB）
    task_acks_late: true               # true = 任务完成后才 ack（崩溃时可重投递）
    task_track_started: true           # true = 任务开始执行即标记 STARTED 状态
    task_soft_time_limit: 600          # 秒 — 超时抛 SoftTimeLimitExceeded（优雅终止）
    task_time_limit: 900               # 秒 — 超时 SIGKILL（硬限制，必须 > soft）
    task_reject_on_worker_lost: true   # worker 崩溃时将未 ack 的任务重新入队
    concurrency: 0                     # worker 并发数（0 = Celery 默认，即 CPU 核数）

  beat:
    redbeat_lock_timeout: 1800         # RedBeat 分布式锁超时秒数；高于官方默认建议，降低短暂 Redis 抖动导致丢锁概率
    max_loop_interval_seconds: 60      # Beat 最长休眠秒数；缩短轮询周期以更频繁刷新 RedBeat 锁

  flower:
    port: 5555
    basic_auth_user: "admin"
    basic_auth_password: "changeme"
    persistent: true


# ── Infra — 基础设施连接 ────────────────────────────────────

infra:
  database:
    timescale_user: "trader"
    timescale_password: "trader_dev"
    timescale_host: "localhost"
    timescale_port: 5432
    timescale_db: "algo_trader"
    postgres_user: "trader"
    postgres_password: "trader_dev"
    postgres_host: "localhost"
    postgres_port: 5433
    postgres_db: "algo_trader_biz"

  redis:
    # Standalone Redis (single instance)
    password: "redis_trader_dev_secure"
    host: "localhost"
    port: 6379
    db: 0

  rabbitmq:
    user: "trader"
    password: "trader_dev"
    host: "localhost"
    port: 5672
    vhost: "/"

  prometheus:
    url: "http://localhost:9090"
    scrape_interval: 15                    # seconds

  grafana:
    url: "http://localhost:3300"


# ── Data Service — 数据采集与过滤 ───────────────────────────

data_service:
  # ── 数据源选择 ──
  providers:
    stock: "yfinance"                  # stock bar provider: yfinance | ...
    options: "yfinance"                # option chain provider: yfinance | ...

  # ── 数据保留策略 ──
  retention_days:
    stock_1min: 14                     # 盘中 1m bars 热存储保留天数
    stock_5min: 21                     # 盘中 5m bars 热存储保留天数
    option_5min: 3                     # 盘中 option snapshots 保留天数

  # ── 采集器韧性（provider 无关）──
  resilience:
    max_retries: 1                     # 单次采集失败后最大重试次数（0 = 不重试，1 = 重试一次，依此类推）
    backoff_base_seconds: 1.0          # 指数退避基础（1s → 2s → 4s）
    rate_limit_per_call_seconds: 0.5   # 单次 API 调用间隔（如每个到期日请求之间）
    rate_limit_per_symbol_seconds: 1.5 # 多 symbol 批量采集时，symbol 之间的间隔
    concurrent_symbols: 3              # 多 symbol 批量采集最大并发数

  # ── 数据过滤器（按资产类型组织）──
  filters:
    options:
      # Stage 1: 数据清洁 — 仅剔除坏数据，不影响 IV smile / skew
      cleaning:
        max_iv: 5.0                    # IV > 5.0 (500%) 视为垃圾数据
        max_days_to_expiry: 730        # 跳过超过此天数的远期到期日（~2年）
      # Stage 2: 可交易标记 — 不剔除，只标记 is_tradeable
      tradeable_marking:
        min_volume: 10                 # 日成交 < 10 → 不可交易
        min_open_interest: 50          # 持仓 < 50 → 不可交易
        max_relative_spread: 0.10      # bid-ask spread / mid > 10% → 不可交易
        min_strike_ratio: 0.75         # strike < 0.75×underlying → 不可交易
        max_strike_ratio: 1.25         # strike > 1.25×underlying → 不可交易
        min_delta_threshold: 0.01      # |delta| < 0.01 → 不可交易
        max_stale_trade_days: 5        # 距上次成交 > 5 天 → 不可交易
    # stocks:                          # 预留 — 未来股票数据清洁 / 异常值过滤
    #   cleaning:
    #     min_volume: 0
    #     max_price_change_pct: 50.0

  # ── Data Worker 配置 ──
  worker:
    schedule:
      options_capture_every_minutes: 5     # 盘中期权链采集间隔（分钟）
      post_market_time: "17:00"            # 统一盘后流水线：options 聚合 → stock 采集 → signals → blueprint
      refresh_earnings_time: "16:50"       # 刷新 earnings cache（pipeline 开始前）
    pipeline:
      chunk_size: 5                         # 每个 chunked stage 的 symbol 分块大小; 过大可能导致单次AGENT任务context过大，过小可能增加总调度开销；
      stop_after: "compute_daily_signals"  # 流水线执行到此步为止（含），后续步骤跳过
      coordination_timeout_minutes: 60      # 两条流水线协调超时（分钟）


# ── Signal Service — 信号计算与策略过滤 ─────────────────────

signal_service:
  # ── IV 历史回溯 ──
  iv_lookback_days: 252              # 用于 IV Rank / IV Percentile 的历史窗口（交易日）

  # ── 期权策略参数 ──
  option_strategy:
    lookback_days: 252                 # iv_percentile 滚动窗口（交易日）
    high_quantile: 0.7                 # iv_percentile >= 70 → 高波动区间
    low_quantile: 0.3                  # iv_percentile <= 30 → 低波动区间

  # ── 信号计算过滤器（按资产类型组织）──
  filters:
    options:
      # Stage 3: 交易级过滤 — 仅用于策略类指标，不影响分析类指标
      trading:
        min_volume: 25                 # 最低日成交量
        min_open_interest: 100         # 最低持仓量
        max_relative_spread: 0.08      # 最大相对价差 8%
        min_delta: 0.08                # Call delta 最小 / Put |delta| 最小
        max_delta: 0.90                # Call delta 最大 / Put |delta| 最大
        min_dte: 7                     # 最短到期日（天）
        max_dte: 120                   # 最长到期日（天）
    # stocks:                          # 预留 — 未来股票交易级过滤
    #   trading:
    #     min_avg_volume_20d: 100000


# ── Analysis Service — LLM 分析引擎 ────────────────────────

analysis_service:
  daily_task_chunk_size: 20            # Daily pipeline analysis fan-out chunk size (one Celery analysis task per chunk)
  llm:
    provider: "closeai"                 # openai / copilot / qiniu / closeai
    openai:
      api_key: ""                       # or env: ANALYSIS_SERVICE__LLM__OPENAI__API_KEY
      model: "claude-opus-4.6"
      reasoning_effort: "high"          # low / medium / high
      temperature: 0.1
      max_tokens: 32768
      request_timeout_seconds: 600
    copilot:
      cli_path: "copilot"
      github_token: ""                 # or env: ANALYSIS_SERVICE__LLM__COPILOT__GITHUB_TOKEN
      model: "claude-opus-4.6"          # default model for all agents
      reasoning_effort: "high"        # low / medium / high
      request_timeout_seconds: 600
    qiniu:
      api_key: ""                       # or env: ANALYSIS_SERVICE__LLM__QINIU__API_KEY
      base_url: "https://api.qnaigc.com/v1"
      model: "gemini-2.5-flash"         # see https://www.qiniu.com/ai/models
      reasoning_effort: "high"          # low / medium / high
      temperature: 0.1
      max_tokens: 32768                 # Gemini 2.5 Flash supports up to 65536 output tokens
      request_timeout_seconds: 600
    closeai:
      api_key: ""                       # or env: ANALYSIS_SERVICE__LLM__CLOSEAI__API_KEY
      base_url: "https://api.openai-proxy.org/v1"
      model: "claude-sonnet-4-20250514" # see https://doc.closeai-asia.com/tutorial/library.html
      reasoning_effort: "high"          # low / medium / high
      temperature: 0.1
      max_tokens: 32768
      request_timeout_seconds: 600
    agent_models_override:                        # per-agent model overrides (empty = use provider default)
      trend: ""
      volatility: ""
      flow: ""
      chain: ""
      spread: ""
      cross_asset: ""
      synthesizer: ""                     # use provider default (opus) — synthesis needs strongest model
      critic: ""
    precision_first:
      enabled: true
      allowed_strategy_types:
        - "single_leg"
        - "vertical_spread"
        - "iron_condor"
        - "calendar_spread"
    coarse_ranking:
      shortlist_size: 5                 # Stage-A shortlist cap before full specialist fan-out
      weights:
        data_quality: 0.4               # Prefer complete, clean signal inputs
        option_coverage: 0.2            # Prefer deeper chain coverage / daily options signal support
        liquidity: 0.2                  # Prefer tighter aggregate bid/ask environments
        strategy_eligibility: 0.1       # Prefer names with more precision-first structures still available
        earnings_buffer: 0.1            # Prefer cleaner earnings distance when other factors are close
    cache_enabled: true
    cache_ttl: 3600
    skill_dir: ""
    output_budget_ratio: 0.8               # 实际请求 completion token 预算 = provider max_tokens 的 80%
    output_truncation_threshold_ratio: 0.95  # 若输出达到请求预算的 95%，视为接近截断并触发保护
    max_critic_revisions: 0               # 30+ symbols 容错档：关闭 revision 循环，减少失败面
    orchestrator_chunk_size: 5            # max non-benchmark symbols per LLM chunk
    orchestrator_max_parallel: 2          # 30+ symbols 容错档：降低 chunk 并行，压低 provider 峰值
    specialist_parallel_limit: 2          # max parallel specialists (pipeline-level gate)
    max_retries: 0                        # 30+ symbols 容错档：为瞬时 provider / parse 失败保留一次重试


# ── Trade Service — 交易执行与风控 ──────────────────────────

trade_service:
  execution_interval: 300              # 执行检查间隔（秒）= 5分钟
  trade_start_time: "09:25"            # 盘前加载蓝图 + 启动执行 tick

  broker:
    type: "paper"                      # paper | futu
    paper:
      initial_cash: 100000.0
    futu:
      host: "127.0.0.1"
      port: 11111
      trader_id: ""
      trd_env: "SIMULATE"              # SIMULATE | REAL
      market: "US"

  risk:
    stop_loss:
      enabled: true
      check_interval_seconds: 60
      portfolio_loss_limit: 2000.0
      position_loss_limit: 500.0
      cooldown_seconds: 60
    blueprint_limits:
      max_daily_loss: 2000.0
      max_margin_usage: 0.5
      portfolio_delta_limit: 0.5
      portfolio_gamma_limit: 0.1

  # ── 盘中入场优化器 ──
  intraday_optimizer:
    enabled: false                       # 启用后接管 entry 逻辑（tick loop 仅保留 exit/stop-loss）
    entry_score_threshold: 0.65          # 综合评分 >= 此值触发入场
    lookback_bars: 6                     # 5m 期权快照回溯条数（30 min）
    stock_lookback_bars: 6               # 5m K 线回溯条数（与 option lookback 对齐）
    preferred_windows:                   # 偏好入场时段（ET）
      - "10:00-11:30"
      - "14:00-15:30"
    blackout_minutes_after_open: 15      # 开盘后黑名单（分钟）
    execution_mode: "auto"               # auto = 自动下单（纸盘）/ notify = 发 Discord 通知
    notify_min_score: 0.55               # notify 模式下最低通知分数

