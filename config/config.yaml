# ═══════════════════════════════════════════════════════════
# 期权聚焦型量化交易平台 — 核心配置
# ═══════════════════════════════════════════════════════════


# ── Common — 跨服务共用配置 ─────────────────────────────────

common:
  timezone: "America/New_York"

  market_hours:
    start: "09:30"
    end: "16:00"

  watchlist:
    for_trade:
      # ── ETFs (3) ──
      - "SPY"
      - "QQQ"
      - "IWM"
      # ── Tech / Growth (10) ──
      - "AAPL"
      - "MSFT"
      - "NVDA"
      - "TSLA"
      - "AMZN"
      - "META"
      - "GOOGL"
      - "AMD"
      - "NFLX"
      - "AVGO"
      # ── AI / Defense (1) ──
      - "PLTR"
      # ── Financials (2) ──
      - "JPM"
      - "GS"
      # ── Payments (1) ──
      - "V"
      # ── Healthcare / Pharma (2) ──
      - "UNH"
      - "LLY"
      # ── Energy (1) ──
      - "XOM"
      # ── Consumer / Industrials (3) ──
      - "COST"
      - "CAT"
      - "UBER"
      # ── Crypto (2) ──
      - "COIN"
      - "IBIT"
    for_trade_benchmark:
      - "SPY"                          # Broad Market
      - "QQQ"                          # Tech / Growth
      - "IWM"                          # Small Cap / Breadth
      - "DIA"                          # Blue Chip / Value
    for_signal_benchmark:
      - "SPY"                          # Broad Market
      - "QQQ"                          # Tech / Growth
      - "IWM"                          # Small Cap / Domestic
      - "TLT"                          # 20Y+ Treasury / Rates
      - "^VIX"                         # Equity Volatility
      - "GLD"                          # Safe Haven / Inflation
      - "HYG"                          # Credit Stress / High Yield
      - "XLE"                          # Energy / Commodity Inflation
      - "IBIT"                         # BTC / Crypto Sentiment

  data_quality:                    # Signal Service and Trade Service 共用数据质量评分参数
    # ── 评分权重（三项之和 = 1.0）──
    weight_stock: 0.5              # 股票数据覆盖率占比
    weight_option: 0.3             # 期权数据覆盖率占比
    weight_degradation: 0.2        # 无降级指标奖励
    # ── 满分参考行数 ──
    stock_full_bars: 260           # ≈ 1 年交易日
    option_full_rows: 200
    # ── 执行门控阈值 ──
    skip_threshold: 0.3            # score < 此值 → 完全跳过执行
    reduce_threshold: 0.7          # score < 此值 → 仓位缩减
    reduce_factor: 0.5             # 缩减比例（0.5 = 减半）

  logging:
    level: "DEBUG"                        # 项目代码日志级别 (shared/, services/)
    lib_level: "INFO"                 # 第三方库日志级别 (celery, redis, yfinance, httpx, etc.)
    format: "json"                       # json / console
    to_console: true
    to_file: true
    file_path: "logs/algo-trader.log"
    file_rotate_mode: "time"           # time / size / none
    file_max_bytes: 104857600
    file_rotate: true
    file_rotate_when: "midnight"
    file_rotate_interval: 1
    file_backup_count: 14
    file_rotate_utc: false

  # ── Notifier — 异步通知（不阻塞主流程）──
  notifier:
    enabled: true
    daily_report_time: "16:30"           # ET — 每日交易报告推送时间
    backends:
      - type: "discord"
        enabled: true
        webhook_url: ""                  # or env: COMMON__NOTIFIER__BACKENDS__0__WEBHOOK_URL
        timeout: 10.0

  # ── Celery 通用运行时 (所有 worker 共享) ──
  celery:
    prefetch_multiplier: 4             # 每次从 broker 预取的任务数（analysis worker 单独覆盖为 1）
    max_memory_per_child: 300000       # KB — 子进程超出后自动重启（300 MB）
    task_acks_late: true               # true = 任务完成后才 ack（崩溃时可重投递）
    task_track_started: true           # true = 任务开始执行即标记 STARTED 状态
    task_soft_time_limit: 600          # 秒 — 超时抛 SoftTimeLimitExceeded（优雅终止）
    task_time_limit: 900               # 秒 — 超时 SIGKILL（硬限制，必须 > soft）
    task_reject_on_worker_lost: true   # worker 崩溃时将未 ack 的任务重新入队
    concurrency: 0                     # worker 并发数（0 = Celery 默认，即 CPU 核数）

  beat:
    redbeat_lock_timeout: 1800         # RedBeat 分布式锁超时秒数；高于官方默认建议，降低短暂 Redis 抖动导致丢锁概率
    max_loop_interval_seconds: 60      # Beat 最长休眠秒数；缩短轮询周期以更频繁刷新 RedBeat 锁

  flower:
    port: 5555
    basic_auth_user: "admin"
    basic_auth_password: "changeme"
    persistent: true


# ── Infra — 基础设施连接 ────────────────────────────────────

infra:
  database:
    timescale_url: "postgresql+asyncpg://trader:trader_dev@localhost:5432/algo_trader"
    postgres_url: "postgresql+asyncpg://trader:trader_dev@localhost:5433/algo_trader_biz"

  redis:
    # Standalone Redis (single instance)
    url: "redis://localhost:6379/0"

  rabbitmq:
    url: "amqp://trader:trader_dev@localhost:5672//"

  minio:
    endpoint: "localhost:9000"
    access_key: "minioadmin"
    secret_key: "minioadmin"
    secure: false

  prometheus:
    url: "http://localhost:9090"
    scrape_interval: 15                    # seconds

  grafana:
    url: "http://localhost:3300"


# ── Data Service — 数据采集与过滤 ───────────────────────────

data_service:
  # ── 数据源选择 ──
  providers:
    stock: "yfinance"                  # stock bar provider: yfinance | ...
    options: "yfinance"                # option chain provider: yfinance | ...

  # ── 数据保留策略 ──
  retention_days:
    stock_1min: 14                     # 盘中 1m bars 热存储保留天数
    stock_5min: 21                     # 盘中 5m bars 热存储保留天数
    option_5min: 21                    # 盘中 option snapshots 保留天数

  # ── 采集器韧性（provider 无关）──
  resilience:
    max_retries: 1                     # 单次采集失败后最大重试次数（0 = 不重试，1 = 重试一次，依此类推）
    backoff_base_seconds: 1.0          # 指数退避基础（1s → 2s → 4s）
    rate_limit_per_call_seconds: 0.5   # 单次 API 调用间隔（如每个到期日请求之间）
    rate_limit_per_symbol_seconds: 1.5 # 多 symbol 批量采集时，symbol 之间的间隔
    concurrent_symbols: 3              # 多 symbol 批量采集最大并发数

  # ── 数据过滤器（按资产类型组织）──
  filters:
    options:
      # Stage 1: 数据清洁 — 仅剔除坏数据，不影响 IV smile / skew
      cleaning:
        max_iv: 5.0                    # IV > 5.0 (500%) 视为垃圾数据
        max_days_to_expiry: 730        # 跳过超过此天数的远期到期日（~2年）
      # Stage 2: 可交易标记 — 不剔除，只标记 is_tradeable
      tradeable_marking:
        min_volume: 10                 # 日成交 < 10 → 不可交易
        min_open_interest: 50          # 持仓 < 50 → 不可交易
        max_relative_spread: 0.10      # bid-ask spread / mid > 10% → 不可交易
        min_strike_ratio: 0.75         # strike < 0.75×underlying → 不可交易
        max_strike_ratio: 1.25         # strike > 1.25×underlying → 不可交易
        min_delta_threshold: 0.01      # |delta| < 0.01 → 不可交易
        max_stale_trade_days: 5        # 距上次成交 > 5 天 → 不可交易
    # stocks:                          # 预留 — 未来股票数据清洁 / 异常值过滤
    #   cleaning:
    #     min_volume: 0
    #     max_price_change_pct: 50.0

  # ── Data Worker 配置 ──
  worker:
    schedule:
      options_capture_every_minutes: 5     # 盘中期权链采集间隔（分钟）
      post_market_time: "17:00"            # 统一盘后流水线：options 聚合 → stock 采集 → signals → blueprint
      refresh_earnings_time: "16:50"       # 刷新 earnings cache（pipeline 开始前）
    pipeline:
      chunk_size: 5                         # 每个 chunked stage 的 symbol 分块大小
      stop_after: "generate_daily_blueprint"  # 流水线执行到此步为止（含），后续步骤跳过
      coordination_timeout_minutes: 60      # 两条流水线协调超时（分钟）


# ── Signal Service — 信号计算与策略过滤 ─────────────────────

signal_service:
  # ── IV 历史回溯 ──
  iv_lookback_days: 252              # 用于 IV Rank / IV Percentile 的历史窗口（交易日）

  # ── 期权策略参数 ──
  option_strategy:
    lookback_days: 252                 # iv_percentile 滚动窗口（交易日）
    high_quantile: 0.7                 # iv_percentile >= 70 → 高波动区间
    low_quantile: 0.3                  # iv_percentile <= 30 → 低波动区间

  # ── 信号计算过滤器（按资产类型组织）──
  filters:
    options:
      # Stage 3: 交易级过滤 — 仅用于策略类指标，不影响分析类指标
      trading:
        min_volume: 25                 # 最低日成交量
        min_open_interest: 100         # 最低持仓量
        max_relative_spread: 0.08      # 最大相对价差 8%
        min_delta: 0.08                # Call delta 最小 / Put |delta| 最小
        max_delta: 0.90                # Call delta 最大 / Put |delta| 最大
        min_dte: 7                     # 最短到期日（天）
        max_dte: 120                   # 最长到期日（天）
    # stocks:                          # 预留 — 未来股票交易级过滤
    #   trading:
    #     min_avg_volume_20d: 100000


# ── Analysis Service — LLM 分析引擎 ────────────────────────

analysis_service:
  llm:
    provider: "closeai"                 # openai / copilot / qiniu / closeai
    openai:
      api_key: ""                       # or env: ANALYSIS_SERVICE__LLM__OPENAI__API_KEY
      model: "claude-opus-4.6"
      reasoning_effort: "high"          # low / medium / high
      temperature: 0.1
      max_tokens: 32768
      request_timeout_seconds: 600
    copilot:
      cli_path: "copilot"
      github_token: ""                 # or env: ANALYSIS_SERVICE__LLM__COPILOT__GITHUB_TOKEN
      model: "claude-opus-4.6"          # default model for all agents
      reasoning_effort: "high"        # low / medium / high
      request_timeout_seconds: 600
    qiniu:
      api_key: ""                       # or env: ANALYSIS_SERVICE__LLM__QINIU__API_KEY
      base_url: "https://api.qnaigc.com/v1"
      model: "gemini-2.5-flash"         # see https://www.qiniu.com/ai/models
      reasoning_effort: "high"          # low / medium / high
      temperature: 0.1
      max_tokens: 32768                 # Gemini 2.5 Flash supports up to 65536 output tokens
      request_timeout_seconds: 600
    closeai:
      api_key: ""                       # or env: ANALYSIS_SERVICE__LLM__CLOSEAI__API_KEY
      base_url: "https://api.openai-proxy.org/v1"
      model: "claude-sonnet-4-20250514" # see https://doc.closeai-asia.com/tutorial/library.html
      reasoning_effort: "high"          # low / medium / high
      temperature: 0.1
      max_tokens: 32768
      request_timeout_seconds: 600
    agent_models_override:                        # per-agent model overrides (empty = use provider default)
      trend: ""
      volatility: ""
      flow: ""
      chain: ""
      spread: ""
      cross_asset: ""
      synthesizer: ""                     # use provider default (opus) — synthesis needs strongest model
      critic: ""
    cache_enabled: true
    cache_ttl: 3600
    skill_dir: ""
    output_budget_ratio: 0.8               # 实际请求 completion token 预算 = provider max_tokens 的 80%
    output_truncation_threshold_ratio: 0.95  # 若输出达到请求预算的 95%，视为接近截断并触发保护
    max_critic_revisions: 1               # Synthesizer↔Critic revision rounds
    orchestrator_chunk_size: 5            # max non-benchmark symbols per LLM chunk
    orchestrator_max_parallel: 3          # max parallel chunk pipelines
    specialist_parallel_limit: 2          # max parallel specialists (pipeline-level gate)


# ── Trade Service — 交易执行与风控 ──────────────────────────

trade_service:
  execution_interval: 300              # 执行检查间隔（秒）= 5分钟
  trade_start_time: "09:25"            # 盘前加载蓝图 + 启动执行 tick

  broker:
    type: "paper"                      # paper | futu
    paper:
      initial_cash: 100000.0
    futu:
      host: "127.0.0.1"
      port: 11111
      trader_id: ""
      trd_env: "SIMULATE"              # SIMULATE | REAL
      market: "US"

  risk:
    stop_loss:
      enabled: true
      check_interval_seconds: 60
      portfolio_loss_limit: 2000.0
      position_loss_limit: 500.0
      cooldown_seconds: 60

  # ── 盘中入场优化器 ──
  intraday_optimizer:
    enabled: false                       # 启用后接管 entry 逻辑（tick loop 仅保留 exit/stop-loss）
    entry_score_threshold: 0.65          # 综合评分 >= 此值触发入场
    lookback_bars: 6                     # 5m 期权快照回溯条数（30 min）
    stock_lookback_bars: 6               # 5m K 线回溯条数（与 option lookback 对齐）
    preferred_windows:                   # 偏好入场时段（ET）
      - "10:00-11:30"
      - "14:00-15:30"
    blackout_minutes_after_open: 15      # 开盘后黑名单（分钟）
    execution_mode: "auto"               # auto = 自动下单（纸盘）/ notify = 发 Discord 通知
    notify_min_score: 0.55               # notify 模式下最低通知分数

