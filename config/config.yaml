# ============================================================
# 期权聚焦型量化交易平台 — 核心配置
# ============================================================

# ── 交易设置 ──
trading:
  default_strategy_type: "option"    # option / stock / mixed
  timezone: "America/New_York"
  data_fetch_interval: 300           # 期权快照间隔（秒）= 5分钟
  execution_interval: 300            # 执行检查间隔（秒）= 5分钟

# ── Data Service 配置 ──
# 盘后数据采集由 Celery pipeline 统一驱动（16:30 触发）
# 盘中期权链采集仅在 intraday_enabled: true 时启用
data_service:
  intraday_enabled: false            # true: 叠加盘中 5min 期权链采集
  market_hours:
    start: "09:30"
    end: "16:00"
    timezone: "America/New_York"
  intraday:
    capture_every_minutes: 5
    max_option_expiries: 3
    hot_storage_retention_days:
      stock_1min: 90                 # 盘后采集的 1m bars 保留天数
      option_5min: 60                # 盘中 option snapshots 保留天数
    archive_retention_days:
      stock_1min: 365
      option_5min: 180
  post_market:
    retention_days: -1               # daily 表保留天数（-1 = 永久）

# ── 期权策略 ──
option_strategy:
  default_strategy: "volatility_smile"
  iv_threshold_high: 70.0            # IV rank 高于此值 → 卖权策略
  iv_threshold_low: 30.0             # IV rank 低于此值 → 买权策略
  delta_neutral_tolerance: 0.1       # Delta中性容忍度
  margin_ratio: 0.2                  # 保证金比例
  max_option_positions: 10           # 最大期权持仓数

# ── LLM 配置 ──
llm:
  provider: "copilot"                 # openai / copilot

  # ── OpenAI ──
  openai_api_key: ""                  # set via env OPENAI_API_KEY or here
  openai_model: "gpt-4o"
  openai_temperature: 0.1
  openai_max_tokens: 4096

  # ── Copilot SDK ──
  copilot_cli_path: "copilot"         # path to copilot CLI binary
  copilot_github_token: ""            # leave empty to use logged-in user
  copilot_model: "gpt-4o"             # model used inside Copilot session
  copilot_temperature: 0.1
  copilot_max_tokens: 4096

  # ── Common ──
  cache_enabled: true
  cache_ttl: 3600                    # 缓存过期（秒）
  skill_dir: ""                      # leave empty to use default (auto-resolved by provider)

# ── 调度时间表 ──
schedule:
  blueprint_load_time: "09:20"
  market_open: "09:30"
  market_close: "16:00"
  batch_flush_time: "16:30"
  backfill_time: "16:35"
  signal_compute_time: "17:00"
  blueprint_generate_time: "17:10"

# ── 监控标的列表 ──
watchlist:
  - "AAPL"
  - "MSFT"
  - "NVDA"
  - "TSLA"
  - "SPY"
  - "QQQ"
  - "AMZN"
  - "META"
  - "GOOGL"
  - "AMD"

# ── 日志 ──
logging:
  level: "INFO"
  format: "json"                     # json / console
