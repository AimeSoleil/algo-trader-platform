global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: ["algo_gateway:8000"]

  # Service names match docker-compose service names (Docker DNS).
  # When scaled to N replicas, Docker DNS round-robins across instances.
  # For per-instance scraping with scaling, consider dns_sd_configs.
  - job_name: data_service
    dns_sd_configs:
      - names: ["data_service"]
        type: A
        port: 8001

  - job_name: signal_service
    dns_sd_configs:
      - names: ["signal_service"]
        type: A
        port: 8002

  - job_name: analysis_service
    dns_sd_configs:
      - names: ["analysis_service"]
        type: A
        port: 8003

  - job_name: trade_service
    dns_sd_configs:
      - names: ["trade_service"]
        type: A
        port: 8004

  - job_name: flower
    static_configs:
      - targets: ["algo_flower:5555"]
    metrics_path: /metrics
