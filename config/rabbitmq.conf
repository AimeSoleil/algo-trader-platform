# ── RabbitMQ Configuration ────────────────────────────────
# Mounted into the rabbitmq container at /etc/rabbitmq/rabbitmq.conf

# Consumer delivery acknowledgement timeout.
# Default is 1800000 ms (30 min).  With task_acks_late=true AND
# Celery countdown-based tasks (e.g. coordination_timeout_check with
# countdown=7200s), the worker holds the unacked message until the
# countdown expires — far exceeding the default timeout.
#
# Disabled (0) because Celery task_time_limit + task_reject_on_worker_lost
# already provide the safety net for stuck/lost tasks.
consumer_timeout = 0
