# File descriptor limit — must align with ulimit nofile in docker-compose.
# RabbitMQ reserves ~3 FDs per AMQP connection. 65536 supports ~21000 concurrent connections.
file_descriptor_limit = 65536

# Heartbeat — RabbitMQ and client negotiate the lower of the two values.
# Celery default is 60s. Setting 60s here ensures dead TCP connections
# (crashed workers that didn't close gracefully) are detected within 2×60=120s
# and their FDs are reclaimed. Without this, stale connections can accumulate
# indefinitely and eventually exhaust the FD limit.
heartbeat = 60

# Connection cap — hard ceiling on simultaneous AMQP connections.
# Estimate: workers × queues × concurrency. For this platform:
#   ~4 services × 2 queues × prefetch 4 ≈ 32 active, plus burst headroom.
# 500 provides a safety ceiling that triggers a clear error ("connection refused")
# before FD exhaustion causes obscure crashes.
connection_max = 500

# Channel cap per connection — Celery opens 1 channel per worker thread.
# 16 is generous for any single connection; prevents runaway channel leaks.
channel_max = 16

# Consumer delivery acknowledgement timeout.
# Celery task_time_limit + task_reject_on_worker_lost
# already provide the safety net for stuck/lost tasks.
# Set 24 hours = 86,400,000 ms
consumer_timeout = 86400000

# Memory watermark — trigger flow-control (block publishers) at 128 MB.
# Server has only 2.4 GB RAM total with heavy swap usage;
# RabbitMQ only routes lightweight Celery task messages, 128 MB is plenty.
vm_memory_high_watermark.absolute = 128MB

# Disk free space limit — block publishing when disk falls below 2 GB.
# Server disk is 86% full (5.8 GB free); set high to protect DB growth.
disk_free_limit.absolute = 2GB
