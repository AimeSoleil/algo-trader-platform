services:
  #===================== Infrastructure Services

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: algo_timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: algo_trader
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: trader_dev
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    networks:
      - algo_trader_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d algo_trader"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: algo_postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: algo_trader_biz
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: trader_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - algo_trader_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d algo_trader_biz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: algo_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    networks:
      - algo_trader_net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping && redis-cli INFO replication | grep -q role:master"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: algo_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: trader
      RABBITMQ_DEFAULT_PASS: trader_dev
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - algo_trader_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  minio:
    image: minio/minio:latest
    container_name: algo_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - algo_trader_net
  
  prometheus:
    image: prom/prometheus:latest
    container_name: algo_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - algo_trader_net
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"

  grafana:
    image: grafana/grafana:latest
    container_name: algo_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - algo_trader_net
  
  # Application Services

  data_service:
    profiles: ["app"]
    build:
      context: .
      dockerfile: services/data_service/Dockerfile
    container_name: algo_data_service
    env_file:
      - .env
    environment:
      CACHE_DIR: /tmp/algo_trader_cache
      PYTHONPATH: /app
    ports:
      - "8001:8001"
    depends_on:
      timescaledb:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - algo_trader_net

  signal_service:
    profiles: ["app"]
    build:
      context: .
      dockerfile: services/signal_service/Dockerfile
    container_name: algo_signal_service
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    ports:
      - "8002:8002"
    depends_on:
      timescaledb:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - algo_trader_net

  analysis_service:
    profiles: ["app"]
    build:
      context: .
      dockerfile: services/analysis_service/Dockerfile
    container_name: algo_analysis_service
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - algo_trader_net

  trade_service:
    profiles: ["app"]
    build:
      context: .
      dockerfile: services/trade_service/Dockerfile
    container_name: algo_trade_service
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    ports:
      - "8004:8004"
    depends_on:
      data_service:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - algo_trader_net

  gateway:
    profiles: ["app"]
    build:
      context: .
      dockerfile: services/gateway_service/Dockerfile
    container_name: algo_gateway
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    networks:
      - algo_trader_net

  # =================== Celery Workers (profile: worker) ===================

  celery-data:
    profiles: ["worker"]
    build:
      context: .
      dockerfile: services/celery_worker/Dockerfile
    container_name: algo_celery_data
    command: worker -Q data -n data@%h --loglevel=INFO
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "shared.celery_app.celery_app", "inspect", "ping", "-d", "celery@data", "--timeout=5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - algo_trader_net

  celery-backfill:
    profiles: ["worker"]
    build:
      context: .
      dockerfile: services/celery_worker/Dockerfile
    container_name: algo_celery_backfill
    command: worker -Q backfill -n backfill@%h --loglevel=INFO
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "shared.celery_app.celery_app", "inspect", "ping", "-d", "celery@backfill", "--timeout=5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - algo_trader_net

  celery-signal:
    profiles: ["worker"]
    build:
      context: .
      dockerfile: services/celery_worker/Dockerfile
    container_name: algo_celery_signal
    command: worker -Q signal -n signal@%h --loglevel=INFO
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "shared.celery_app.celery_app", "inspect", "ping", "-d", "celery@signal", "--timeout=5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - algo_trader_net

  celery-analysis:
    profiles: ["worker"]
    build:
      context: .
      dockerfile: services/celery_worker/Dockerfile
    container_name: algo_celery_analysis
    command: worker -Q analysis -n analysis@%h --loglevel=INFO
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "shared.celery_app.celery_app", "inspect", "ping", "-d", "celery@analysis", "--timeout=5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - algo_trader_net

  celery-beat:
    profiles: ["worker"]
    build:
      context: .
      dockerfile: services/celery_worker/Dockerfile
    container_name: algo_celery_beat
    command: beat --loglevel=INFO --pidfile=/tmp/celerybeat.pid
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celerybeat.pid && kill -0 $(cat /tmp/celerybeat.pid)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - algo_trader_net

  flower:
    profiles: ["worker"]
    build:
      context: .
      dockerfile: services/celery_worker/Dockerfile
    container_name: algo_flower
    entrypoint: ["celery", "-A", "shared.celery_app.celery_app"]
    command:
      - flower
      - --port=5555
      - --basic-auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-changeme}
      - --broker_api=http://${RABBITMQ_USER:-trader}:${RABBITMQ_PASS:-trader_dev}@rabbitmq:15672/api/
      - --persistent=true
      - --db=/tmp/flower.db
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    ports:
      - "5555:5555"
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5555/healthcheck || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - algo_trader_net

networks:
  algo_trader_net:
    driver: bridge

volumes:
  timescaledb_data:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  prometheus_data:
  grafana_data:
