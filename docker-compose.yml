# ═══════════════════════════════════════════════════════════
# Infrastructure — databases, message brokers, observability
# ═══════════════════════════════════════════════════════════
#
# Usage:
#   Infra only:      docker compose up -d
#   + App services:  docker compose -f docker-compose.yml -f docker-compose.app.yml up -d
#   + Workers:       docker compose -f docker-compose.yml -f docker-compose.app.yml -f docker-compose.worker.yml up -d
#
# Or set in .env:
#   COMPOSE_FILE=docker-compose.yml:docker-compose.app.yml:docker-compose.worker.yml

services:

  # ── Databases ──────────────────────────────────────────────

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: algo_timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: algo_trader
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: trader_dev
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    networks:
      algo_trader_net:
        aliases:
          - timescaledb
          - algo_timescaledb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d algo_trader"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: algo_postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: algo_trader_biz
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: trader_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      algo_trader_net:
        aliases:
          - postgres
          - algo_postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d algo_trader_biz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis ───────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: algo_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: ["redis-server", "/usr/local/etc/redis/redis.conf", "--port", "6379"]
    networks:
      algo_trader_net:
        aliases:
          - redis
          - algo_redis
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Message Broker ─────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: algo_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: trader
      RABBITMQ_DEFAULT_PASS: trader_dev
      # Set Erlang VM max ports (= file descriptors for sockets/pipes).
      # Must match ulimit nofile below. RabbitMQ uses ~3 FDs per AMQP connection.
      ERL_MAX_PORTS: "65536"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    # Plain docker compose honors mem_limit; keep RabbitMQ lightweight on the
    # 2.4 GiB host, but give it headroom above the flow-control watermark.
    mem_limit: 384m
    deploy:
      resources:
        limits:
          memory: 384M
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./config/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    networks:
      algo_trader_net:
        aliases:
          - rabbitmq
          - algo_rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Object Storage ─────────────────────────────────────────

  minio:
    image: minio/minio:latest
    container_name: algo_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      algo_trader_net:
        aliases:
          - minio
          - algo_minio

  # ── Observability ──────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: algo_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      algo_trader_net:
        aliases:
          - prometheus
          - algo_prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"

  grafana:
    image: grafana/grafana:latest
    container_name: algo_grafana
    ports:
      - "${GRAFANA_PORT:-3300}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      algo_trader_net:
        aliases:
          - grafana
          - algo_grafana

networks:
  algo_trader_net:
    driver: bridge

volumes:
  timescaledb_data:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  prometheus_data:
  grafana_data:
